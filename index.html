<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/vite.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dinesh Ramar - React Frontend Developer</title>

  <!-- FOUC Prevention: Apply theme before React loads -->
  <script>
    (function () {
      const theme = localStorage.getItem('theme') ||
        (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
      if (theme === 'dark') {
        document.documentElement.classList.add('dark');
      }
    })();
  </script>

  <!-- SEO and Open Graph meta tags -->
  <meta name="description"
    content="React Frontend Developer with 4+ years building secure, accessible applications for banking and fintech clients." />
  <meta name="keywords"
    content="React.js, TypeScript, Redux Toolkit, Frontend Developer, React Developer, Tailwind CSS, WCAG, enterprise frontend" />
  <meta name="author" content="Dinesh Ramar" />
  <meta property="og:title" content="Dinesh Ramar — Frontend React Developer" />
  <meta property="og:description"
    content="Frontend React Developer with 4+ years of experience building secure, scalable, and accessible enterprise applications." />
</head>

<body>
  <div id="app"></div>
  <script type="module" src="/src/main.tsx"></script>
</body>

</html>
